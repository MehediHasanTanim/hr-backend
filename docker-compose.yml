version: '3.9'

services:
  api:
    image: node:22-bookworm-slim
    container_name: hr_backend_api
    restart: unless-stopped
    working_dir: /workspace
    command: >
      sh -lc "apt-get update &&
              apt-get install -y --no-install-recommends openssl &&
              rm -rf /var/lib/apt/lists/* &&
              corepack enable &&
              corepack prepare pnpm@9.15.9 --activate &&
              pnpm install --frozen-lockfile &&
              pnpm --filter @hr/prisma generate &&
              pnpm --filter @hr/api start:dev"
    environment:
      NODE_ENV: development
      PORT: 8025
      HOST: 0.0.0.0
      API_BASE_URL: http://localhost:8025
      WEB_BASE_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://hr_app:hr_app_secret@postgres:5432/hr_dev
      REDIS_URL: redis://:redis_secret@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_secret
      JWT_PRIVATE_KEY_PATH: /workspace/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /workspace/keys/public.pem
      COOKIE_SECRET: change-me-to-at-least-32-characters
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_FROM: no-reply@hr.local
      SSO_ENABLED: 'false'
      SWAGGER_ENABLED: 'true'
    ports:
      - '8025:8025'
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailhog:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: hr_backend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hr_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hr_backend_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '$${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hr_backend_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hr_backend_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8026:8025'

volumes:
  api_node_modules:
  postgres_data:
  redis_data:
  minio_data:
