name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/dist
            apps/worker/dist
          retention-days: 3

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hr_user
          POSTGRES_PASSWORD: hr_secret
          POSTGRES_DB: hr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025
          - 8025:8025

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://hr_user:hr_secret@localhost:5432/hr_test
      REDIS_URL: redis://localhost:6379/1
      JWT_PRIVATE_KEY_PATH: ./keys/private.pem
      JWT_PUBLIC_KEY_PATH: ./keys/public.pem
      COOKIE_SECRET: test-cookie-secret-with-at-least-32-characters
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_FROM: noreply@test.hr
      MINIO_ENDPOINT: localhost
      MINIO_ACCESS_KEY: test
      MINIO_SECRET_KEY: test-secret
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Push Prisma schema to test DB
        run: pnpm --filter @hr/prisma exec prisma db push --schema schema.prisma
      - name: Create restricted audit_logs DB role
        run: |
          psql "$DATABASE_URL" -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'hr_app') THEN
                CREATE ROLE hr_app LOGIN PASSWORD 'hr_app_secret';
              END IF;
            END \$\$;
            GRANT SELECT, INSERT ON audit_logs TO hr_app;
            REVOKE UPDATE, DELETE ON audit_logs FROM hr_app;
          "
      - name: Run Sprint 1 regression tests
        run: pnpm --filter @hr/api test:regression
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: apps/api/coverage/regression-report.html
          retention-days: 14

  integration:
    name: Integration Tests (TestContainers)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=libs/prisma/schema.prisma
      - name: Run integration tests
        run: npx vitest run test/integration/**/*.integration.spec.ts --reporter=verbose
        env:
          NODE_ENV: test
        timeout-minutes: 15

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    needs: integration
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hr_user
          POSTGRES_PASSWORD: hr_pass
          POSTGRES_DB: hr_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate --schema=libs/prisma/schema.prisma
      - name: Run migrations
        run: npx prisma migrate deploy --schema=libs/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://hr_user:hr_pass@localhost:5432/hr_e2e
      - name: Seed E2E users
        run: npx tsx scripts/seed-e2e-users.ts
        env:
          DATABASE_URL: postgresql://hr_user:hr_pass@localhost:5432/hr_e2e
          E2E_HR_ADMIN_EMAIL: hr-admin@e2e.internal
          E2E_EMPLOYEE_EMAIL: employee@e2e.internal
          E2E_MANAGER_EMAIL: manager@e2e.internal
          E2E_PASSWORD: SmokeTest@1234
      - name: Start server
        run: |
          npx tsx apps/api/src/main.ts &
          sleep 5
        env:
          DATABASE_URL: postgresql://hr_user:hr_pass@localhost:5432/hr_e2e
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3000
          MINIO_ENDPOINT: localhost
          MINIO_ACCESS_KEY: access
          MINIO_SECRET_KEY: secret
          JWT_PRIVATE_KEY_PATH: keys/private.pem
          JWT_PUBLIC_KEY_PATH: keys/public.pem
          COOKIE_SECRET: 12345678901234567890123456789012
          ENCRYPTION_KEY: 01234567890123456789012345678901
          MAIL_HOST: localhost
          MAIL_FROM: test@example.com
          LOG_LEVEL: info
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests
        run: npx playwright test e2e/smoke/ --reporter=github
        env:
          BASE_URL: http://localhost:3000
          E2E_HR_ADMIN_EMAIL: hr-admin@e2e.internal
          E2E_EMPLOYEE_EMAIL: employee@e2e.internal
          E2E_MANAGER_EMAIL: manager@e2e.internal
          E2E_HR_ADMIN_PASSWORD: SmokeTest@1234
          E2E_EMPLOYEE_PASSWORD: SmokeTest@1234
          E2E_MANAGER_PASSWORD: SmokeTest@1234
